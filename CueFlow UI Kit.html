  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

/\n  --bg:        #07070a;\n  --canvas:    #0a0a0d;\n  --surface:   #111116;\n  --surface2:  #16161c;\n  --surface3:  #1d1d24;\n  --hair:      #22222a;\n  --hair2:     #2e2e38;\n  --hair3:     #3a3a48;\n\n  --txt-hi:    #eef0f3;\n  --txt:       #c8c9d0;\n  --txt-mid:   #7c7e8a;\n  --txt-low:   #4a4c56;\n  --txt-dim:   #2f3038;\n\n  /* Semantic accents — match Redesign exactly */\n  --primary:    #f0a838;  /* Amber — standby / primary action */\n  --primary-bg: rgba(240,168,56,0.10);\n  --primary-dim:rgba(240,168,56,0.55);\n\n  --danger:     #ff2848;  /* Tally red */\n  --danger-bg:  rgba(255,40,72,0.10);\n\n  --success:    #18d986;\n  --success-bg: rgba(24,217,134,0.08);\n\n  --info:       #4c8dff;\n  --info-bg:    rgba(76,141,255,0.10);\n\n  --warning:    #f0a838;  /* same as primary */\n  --warning-bg: var(--primary-bg);\n\n  /* ── Spacing scale (4-px grid) ── */\n  --s-1:  4px;\n  --s-2:  8px;\n  --s-3:  12px;\n  --s-4:  16px;\n  --s-5:  20px;\n  --s-6:  24px;\n  --s-8:  32px;\n  --s-10: 40px;\n  --s-12: 48px;\n  --s-16: 64px;\n\n  /* ── Typography ── */\n  --mono:  'JetBrains Mono', ui-monospace, monospace;\n  --sans:  'IBM Plex Sans', system-ui, sans-serif;\n  --cond:  'IBM Plex Sans Condensed', 'IBM Plex Sans', sans-serif;\n\n  /* ── Component sizing ── */\n  --ctrl-sm: 28px;\n  --ctrl-md: 36px;\n  --ctrl-lg: 44px;\n\n  /* ── Focus ring (a11y) ── */\n  --focus: 0 0 0 2px var(--bg), 0 0 0 4px var(--primary);\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nhtml, body {\n  background: var(--bg);\n  color: var(--txt);\n  font-family: var(--sans);\n  font-size: 14px;\n  font-feature-settings: 'ss01', 'ss02';\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ═══════════════════════════════════════════════\n   DOCUMENT SHELL — sticky rail + main column\n   ═══════════════════════════════════════════════ */\n.doc {\n  display: grid;\n  grid-template-columns: 240px 1fr;\n  min-height: 100vh;\n}\n\n.docrail {\n  position: sticky;\n  top: 0;\n  height: 100vh;\n  border-right: 1px solid var(--hair);\n  background: var(--surface);\n  display: flex;\n  flex-direction: column;\n  padding: var(--s-6) 0;\n  overflow: hidden;\n}\n.docrail-brand {\n  padding: 0 var(--s-6) var(--s-6);\n  border-bottom: 1px solid var(--hair);\n  display: grid;\n  grid-template-columns: 28px 1fr;\n  align-items: center;\n  gap: var(--s-3);\n}\n.docrail-brand .mark {\n  width: 28px; height: 28px;\n  background: var(--primary);\n  display: grid; place-items: center;\n  font-family: var(--mono);\n  font-weight: 800;\n  font-size: 16px;\n  color: #06060a;\n  letter-spacing: -0.04em;\n}\n.docrail-brand .nm {\n  font-family: var(--cond);\n  font-weight: 700;\n  font-size: 14px;\n  letter-spacing: 0.06em;\n  color: var(--txt-hi);\n  text-transform: uppercase;\n}\n.docrail-brand .nm span {\n  display: block;\n  font-size: 9px;\n  font-weight: 600;\n  letter-spacing: 0.22em;\n  color: var(--txt-mid);\n  margin-top: 2px;\n}\n\n.docrail-list { padding: var(--s-3) 0; overflow-y: auto; }\n.docrail-grp {\n  padding: var(--s-5) var(--s-6) var(--s-2);\n  font-family: var(--cond);\n  font-size: 9px;\n  font-weight: 700;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--txt-mid);\n}\n.docrail-lnk {\n  display: grid;\n  grid-template-columns: 24px 1fr auto;\n  align-items: center;\n  gap: var(--s-2);\n  padding: 7px var(--s-6);\n  font-family: var(--sans);\n  font-size: 12.5px;\n  color: var(--txt);\n  text-decoration: none;\n  border-left: 2px solid transparent;\n}\n.docrail-lnk:hover { background: var(--surface2); color: var(--txt-hi); }\n.docrail-lnk .ix {\n  font-family: var(--mono);\n  font-size: 10px;\n  color: var(--txt-low);\n}\n.docrail-lnk .ct {\n  font-family: var(--mono);\n  font-size: 9.5px;\n  color: var(--txt-low);\n}\n.docrail-lnk.active {\n  background: var(--surface2);\n  border-left-color: var(--primary);\n  color: var(--txt-hi);\n}\n.docrail-lnk.active .ix { color: var(--primary); }\n\n.docrail-foot {\n  margin-top: auto;\n  padding: var(--s-4) var(--s-6);\n  border-top: 1px solid var(--hair);\n  font-family: var(--mono);\n  font-size: 10px;\n  color: var(--txt-low);\n  line-height: 1.6;\n}\n\n/* ── Main column ── */\n.docmain { min-width: 0; }\n\n.dochead {\n  padding: var(--s-12) var(--s-12) var(--s-8);\n  border-bottom: 1px solid var(--hair);\n  background:\n    linear-gradient(to bottom, rgba(240,168,56,0.025), transparent 60%),\n    var(--bg);\n  display: grid;\n  grid-template-columns: 1fr auto;\n  gap: var(--s-8);\n  align-items: end;\n}\n.dochead .eyebrow {\n  font-family: var(--cond);\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.24em;\n  text-transform: uppercase;\n  color: var(--primary);\n  display: flex;\n  align-items: center;\n  gap: var(--s-2);\n  margin-bottom: var(--s-3);\n}\n.dochead h1 {\n  font-family: var(--cond);\n  font-weight: 700;\n  font-size: 72px;\n  line-height: 0.92;\n  letter-spacing: -0.015em;\n  text-transform: uppercase;\n  color: var(--txt-hi);\n}\n.dochead p {\n  font-family: var(--sans);\n  font-size: 16px;\n  color: var(--txt);\n  margin-top: var(--s-5);\n  max-width: 60ch;\n  line-height: 1.5;\n  text-wrap: pretty;\n}\n.dochead .meta {\n  display: grid;\n  grid-template-columns: auto auto;\n  gap: var(--s-2) var(--s-5);\n  font-family: var(--cond);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--txt-mid);\n  align-content: end;\n}\n.dochead .meta .v {\n  font-family: var(--mono);\n  font-size: 11px;\n  color: var(--txt-hi);\n  letter-spacing: 0;\n  text-transform: none;\n}\n\n/* ── Sections ── */\n.section {\n  padding: var(--s-12) var(--s-12);\n  border-bottom: 1px solid var(--hair);\n}\n.section-head {\n  display: grid;\n  grid-template-columns: auto 1fr;\n  gap: var(--s-6);\n  align-items: baseline;\n  margin-bottom: var(--s-10);\n  padding-bottom: var(--s-5);\n  border-bottom: 1px solid var(--hair);\n}\n.section-head .num {\n  font-family: var(--mono);\n  font-size: 56px;\n  font-weight: 700;\n  color: var(--primary);\n  letter-spacing: -0.04em;\n  line-height: 1;\n}\n.section-head .t {\n  font-family: var(--cond);\n  font-weight: 700;\n  font-size: 36px;\n  text-transform: uppercase;\n  color: var(--txt-hi);\n  letter-spacing: -0.005em;\n  line-height: 1;\n}\n.section-head .d {\n  font-family: var(--sans);\n  font-size: 14px;\n  color: var(--txt-mid);\n  margin-top: var(--s-2);\n  max-width: 70ch;\n  line-height: 1.5;\n}\n\n/* ── Block: a component group ── */\n.block {\n  margin-bottom: var(--s-12);\n}\n.block-head {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  align-items: baseline;\n  gap: var(--s-4);\n  padding-bottom: var(--s-3);\n  margin-bottom: var(--s-5);\n  border-bottom: 1px solid var(--hair2);\n}\n.block-head .t {\n  font-family: var(--cond);\n  font-weight: 700;\n  font-size: 18px;\n  text-transform: uppercase;\n  color: var(--txt-hi);\n  letter-spacing: 0.02em;\n}\n.block-head .ix {\n  font-family: var(--mono);\n  font-size: 11px;\n  color: var(--txt-low);\n  letter-spacing: 0;\n}\n.block-head .d {\n  grid-column: 1 / -1;\n  font-family: var(--sans);\n  font-size: 13px;\n  color: var(--txt-mid);\n  margin-top: var(--s-1);\n  max-width: 70ch;\n  line-height: 1.5;\n}\n\n/* ── Demo surface (where components are previewed) ── */\n.demo {\n  background: var(--canvas);\n  border: 1px solid var(--hair);\n  padding: var(--s-8);\n  display: flex;\n  flex-wrap: wrap;\n  gap: var(--s-5);\n  align-items: center;\n  position: relative;\n}\n.demo.col { flex-direction: column; align-items: stretch; }\n.demo.tight { padding: var(--s-5); gap: var(--s-3); }\n.demo.pad-lg { padding: var(--s-10) var(--s-8); }\n.demo.dark { background: var(--bg); }\n.demo-corner {\n  position: absolute;\n  top: 0; left: 0;\n  font-family: var(--mono);\n  font-size: 9px;\n  letter-spacing: 0.1em;\n  color: var(--txt-low);\n  text-transform: uppercase;\n  padding: 5px 8px;\n  background: var(--bg);\n  border-right: 1px solid var(--hair);\n  border-bottom: 1px solid var(--hair);\n}\n\n/* state label under variants */\n.state {\n  font-family: var(--cond);\n  font-size: 9px;\n  font-weight: 700;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--txt-mid);\n  margin-top: var(--s-2);\n  text-align: center;\n}\n.cluster {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: var(--s-1);\n}\n\n/* spec table */\n.spec {\n  display: grid;\n  grid-template-columns: 160px 1fr;\n  gap: 0;\n  font-family: var(--mono);\n  font-size: 11px;\n  border: 1px solid var(--hair);\n  margin-top: var(--s-5);\n}\n.spec dt, .spec dd {\n  padding: 8px 12px;\n  border-bottom: 1px solid var(--hair);\n}\n.spec dt {\n  background: var(--surface);\n  font-family: var(--cond);\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--txt-mid);\n  border-right: 1px solid var(--hair);\n}\n.spec dd { color: var(--txt-hi); }\n.spec dt:last-of-type, .spec dt:nth-last-of-type(2),\n.spec dd:last-of-type { border-bottom: none; }\n\n/* code block */\npre.code {\n  background: var(--surface);\n  border: 1px solid var(--hair);\n  border-left: 2px solid var(--primary-dim);\n  padding: var(--s-4);\n  font-family: var(--mono);\n  font-size: 11.5px;\n  line-height: 1.6;\n  color: var(--txt);\n  overflow-x: auto;\n  margin-top: var(--s-3);\n  white-space: pre;\n}\npre.code .tk-tag { color: var(--info); }\npre.code .tk-att { color: var(--primary); }\npre.code .tk-str { color: var(--success); }\npre.code .tk-com { color: var(--txt-low); font-style: italic; }\npre.code .tk-kw  { color: #d77eff; }\n\n/* ═══════════════════════════════════════════════\n   TOKENS GRID — colors, spacing, type scale\n   ═══════════════════════════════════════════════ */\n.tok-grid {\n  display: grid;\n  grid-template-columns: repeat(5, 1fr);\n  gap: 1px;\n  background: var(--hair);\n  border: 1px solid var(--hair);\n}\n.tok-grid.three { grid-template-columns: repeat(3, 1fr); }\n.tok-grid.six { grid-template-columns: repeat(6, 1fr); }\n.tok {\n  background: var(--canvas);\n  padding: var(--s-4);\n  display: flex;\n  flex-direction: column;\n  gap: var(--s-2);\n}\n.tok-sw {\n  height: 64px;\n  position: relative;\n  border: 1px solid rgba(255,255,255,0.06);\n}\n.tok-sw.tile {\n  background:\n    linear-gradient(135deg, rgba(255,255,255,0.04) 25%, transparent 25%) 0 0/8px 8px,\n    var(--swatch, var(--surface));\n}\n.tok-name {\n  font-family: var(--cond);\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--txt-hi);\n}\n.tok-hex {\n  font-family: var(--mono);\n  font-size: 10.5px;\n  color: var(--txt-mid);\n}\n.tok-use {\n  font-family: var(--sans);\n  font-size: 11px;\n  color: var(--txt-mid);\n  line-height: 1.4;\n}\n\n/* spacing tokens */\n.sp-row {\n  display: grid;\n  grid-template-columns: 80px 1fr 80px;\n  align-items: center;\n  gap: var(--s-4);\n  padding: 8px 0;\n  border-bottom: 1px solid var(--hair);\n  font-family: var(--mono);\n  font-size: 11px;\n}\n.sp-row .tok-name { font-size: 11px; }\n.sp-bar {\n  height: 14px;\n  background: var(--primary);\n}\n.sp-row .px { color: var(--txt-mid); text-align: right; }\n\n/* type sample */\n.type-sample { padding: var(--s-4) 0; border-bottom: 1px solid var(--hair); }\n.type-sample:last-child { border-bottom: none; }\n.type-spec {\n  display: flex;\n  gap: var(--s-5);\n  font-family: var(--mono);\n  font-size: 10px;\n  color: var(--txt-mid);\n  margin-top: var(--s-2);\n  letter-spacing: 0.04em;\n}\n.type-spec b { color: var(--txt-hi); font-weight: 600; }\n\n/* ═══════════════════════════════════════════════\n   COMPONENT: BUTTONS\n   Sizes: sm 28, md 36, lg 44. Hairline borders.\n   No rounded corners. Primary uses amber.\n   ═══════════════════════════════════════════════ */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: var(--s-2);\n  height: var(--ctrl-md);\n  padding: 0 var(--s-4);\n  font-family: var(--cond);\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  background: var(--surface2);\n  color: var(--txt);\n  border: 1px solid var(--hair2);\n  cursor: pointer;\n  user-select: none;\n  white-space: nowrap;\n  position: relative;\n  outline: none;\n  transition: background 80ms linear, border-color 80ms linear, color 80ms linear;\n}\n.btn svg {\n  width: 14px; height: 14px;\n  stroke: currentColor; fill: none;\n  stroke-width: 1.7;\n  stroke-linecap: round;\n  stroke-linejoin: round;\n  flex-shrink: 0;\n}\n.btn:hover { background: var(--surface3); border-color: var(--hair3); color: var(--txt-hi); }\n.btn:active { background: var(--surface); transform: translateY(0.5px); }\n.btn:focus-visible { box-shadow: var(--focus); }\n.btn:disabled,\n.btn.is-disabled {\n  color: var(--txt-low);\n  background: var(--surface);\n  border-color: var(--hair);\n  cursor: not-allowed;\n}\n\n/* sizes */\n.btn.sm { height: var(--ctrl-sm); padding: 0 var(--s-3); font-size: 10px; gap: 6px; }\n.btn.sm svg { width: 12px; height: 12px; }\n.btn.lg { height: var(--ctrl-lg); padding: 0 var(--s-5); font-size: 12px; letter-spacing: 0.16em; }\n.btn.lg svg { width: 16px; height: 16px; }\n\n/* primary — amber fill */\n.btn.primary {\n  background: var(--primary);\n  border-color: var(--primary);\n  color: #06060a;\n}\n.btn.primary:hover { background: #ffba50; border-color: #ffba50; }\n.btn.primary:active { background: #d8941f; border-color: #d8941f; }\n.btn.primary:disabled,\n.btn.primary.is-disabled { background: var(--surface); border-color: var(--hair); color: var(--txt-low); }\n\n/* danger — tally red (destructive) */\n.btn.danger {\n  background: transparent;\n  border-color: var(--danger);\n  color: var(--danger);\n}\n.btn.danger:hover { background: var(--danger-bg); color: #fff; }\n.btn.danger.solid { background: var(--danger); color: #fff; }\n.btn.danger.solid:hover { background: #ff4663; border-color: #ff4663; }\n\n/* tertiary / ghost — no border */\n.btn.ghost {\n  background: transparent;\n  border-color: transparent;\n  color: var(--txt-mid);\n}\n.btn.ghost:hover { color: var(--txt-hi); background: var(--surface2); border-color: var(--hair2); }\n.btn.ghost:disabled { color: var(--txt-dim); background: transparent; border-color: transparent; }\n\n/* icon-only */\n.btn.icon {\n  width: var(--ctrl-md);\n  padding: 0;\n}\n.btn.icon.sm { width: var(--ctrl-sm); }\n.btn.icon.lg { width: var(--ctrl-lg); }\n\n/* loading state */\n.btn .spin {\n  width: 12px; height: 12px;\n  border: 1.5px solid currentColor;\n  border-top-color: transparent;\n  border-radius: 50%;\n  animation: spin 700ms linear infinite;\n}\n@keyframes spin { to { transform: rotate(360deg); } }\n.btn.is-loading { pointer-events: none; }\n.btn.is-loading .btn-lbl { opacity: 0.7; }\n\n/* ═══════════════════════════════════════════════\n   COMPONENT: FORM INPUT\n   ═══════════════════════════════════════════════ */\n.fld {\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n  min-width: 240px;\n}\n.fld-lbl {\n  font-family: var(--cond);\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--txt-mid);\n}\n.fld-lbl .req { color: var(--danger); margin-left: 3px; }\n.fld-help {\n  font-family: var(--sans);\n  font-size: 11.5px;\n  color: var(--txt-mid);\n  display: flex;\n  align-items: center;\n  gap: 5px;\n  line-height: 1.4;\n}\n.fld-help.err { color: var(--danger); }\n.fld-help.ok { color: var(--success); }\n.fld-help svg {\n  width: 12px; height: 12px;\n  stroke: currentColor; fill: none;\n  stroke-width: 1.8;\n  stroke-linecap: round;\n  stroke-linejoin: round;\n  flex-shrink: 0;\n}\n\n.input {\n  display: flex;\n  align-items: center;\n  height: var(--ctrl-md);\n  background: var(--surface2);\n  border: 1px solid var(--hair2);\n  font-family: var(--mono);\n  font-size: 12.5px;\n  color: var(--txt-hi);\n  position: relative;\n  transition: border-color 80ms linear, background 80ms linear;\n}\n.input input,\n.input textarea,\n.input select {\n  flex: 1;\n  height: 100%;\n  background: transparent;\n  border: none;\n  outline: none;\n  padding: 0 var(--s-3);\n  font-family: inherit;\n  font-size: inherit;\n  color: inherit;\n  min-width: 0;\n}\n.input textarea { padding: var(--s-3); line-height: 1.5; resize: vertical; }\n.input input::placeholder,\n.input textarea::placeholder { color: var(--txt-low); font-family: var(--sans); }\n.input:hover { border-color: var(--hair3); }\n.input.is-focus,\n.input:focus-within {\n  border-color: var(--primary);\n  background: var(--surface);\n  box-shadow: inset 0 0 0 1px var(--primary-dim);\n}\n.input.is-error { border-color: var(--danger); }\n.input.is-error:focus-within { box-shadow: inset 0 0 0 1px var(--danger); }\n.input.is-disabled,\n.input.is-disabled input { background: var(--surface); color: var(--txt-low); cursor: not-allowed; }\n.input.is-disabled { border-color: var(--hair); }\n\n/* slotted icons inside input */\n.input .ico {\n  display: grid; place-items: center;\n  width: 36px; height: 100%;\n  color: var(--txt-mid);\n}\n.input .ico svg {\n  width: 14px; height: 14px;\n  stroke: currentColor; fill: none;\n  stroke-width: 1.6;\n  stroke-linecap: round;\n  stroke-linejoin: round;\n}\n.input.is-focus .ico { color: var(--primary); }\n.input .ico.btn-slot {\n  cursor: pointer;\n  border-left: 1px solid var(--hair2);\n}\n.input .ico.btn-slot:hover { color: var(--txt-hi); background: var(--surface3); }\n\n/* textarea variant */\n.input.area { height: auto; align-items: stretch; }\n\n/* sizes */\n.input.sm { height: var(--ctrl-sm); font-size: 11.5px; }\n.input.lg { height: var(--ctrl-lg); font-size: 13px; }\n\n/* floating label */\n.fld.float .fld-lbl {\n  position: absolute;\n  top: 11px; left: 12px;\n  z-index: 1;\n  transition: 120ms ease;\n  pointer-events: none;\n  background: var(--surface2);\n  padding: 0 4px;\n  ma oke: var(--success); }\n.spinner.danger .head  { stroke: var(--danger); }\n\n/* ═══════════════════════════════════════════════\n   FOOTER\n   ═══════════════════════════════════════════════ */\n.docfoot {\n  padding: var(--s-12);\n  display: grid;\n  grid-template-columns: 1fr auto;\n  gap: var(--s-8);\n  align-items: end;\n  font-family: var(--cond);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--txt-mid);\n}\n.docfoot .v { font-family: var(--mono); font-size: 11px; color: var(--txt-hi); letter-spacing: 0; text-transform: none; }\n\n/* scrollbar polish */\n::-webkit-scrollbar { width: 10px; height: 10px; }\n::-webkit-scrollbar-track { background: var(--bg); }\n::-webkit-scrollbar-thumb { background: var(--hair2); border: 2px solid var(--bg); }\n::-webkit-scrollbar-thumb:hover { background: var(--hair3); }\n<\u002Fstyle>\n<\u002Fhead>\n\n<body>\n\n<div class=\"doc\">\n\n  <!-- ═══════════════════════════════════════════\n       LEFT RAIL\n       ═══════════════════════════════════════════ -->\n  <aside class=\"docrail\">\n    <div class=\"docrail-brand\">\n      <div class=\"mark\">C<\u002Fdiv>\n      <div class=\"nm\">CueFlow<span>UI Kit · v1.0<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <nav class=\"docrail-list\">\n      <div class=\"docrail-grp\">Foundations<\u002Fdiv>\n      <a class=\"docrail-lnk\" href=\"#tokens\">      <span class=\"ix\">F1<\u002Fspan><span>Tokens<\u002Fspan><span class=\"ct\">28<\u002Fspan><\u002Fa>\n      <a class=\"docrail-lnk\" href=\"#type\">         <span class=\"ix\">F2<\u002Fspan><span>Type scale<\u002Fspan><span class=\"ct\">8<\u002Fspan><\u002Fa>\n\n      <div class=\"docrail-grp\">1 · Input Controls<\u002Fdiv>\n      <a class=\"docrail-lnk active\" href=\"#buttons\"><span class=\"ix\">1.1<\u002Fspan><span>Buttons<\u002Fspan><span class=\"ct\">12<\u002Fspan><\u002Fa>\n      <a class=\"docrail-lnk\" href=\"#fields\">       <span class=\"ix\">1.2<\u002Fspan><span>  v1.0.0 — 2026.05.28<br>\n      cueflow / design-system<br>\n      WCAG AA · 4-px grid\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- ═══════════════════════════════════════════\n       MAIN\n       ═══════════════════════════════════════════ -->\n  <main class=\"docmain\">\n\n    <!-- HEADER ────────────────────────────────── -->\n    <header class=\"dochead\">\n      <div>\n        <div class=\"eyebrow\"><span class=\"pip-dot\" style=\"display:inline-block;width:6px;height:6px;background:var(--primary)\"><\u002Fspan> CueFlow / Design System<\u002Fdiv>\n        <h1>UI Kit<\u002Fh1>\n        <p>Production component library extending the CueFlow broadcast cockpit. Every primitive obeys the same hairline grammar, monospaced numerics, and condensed-caps labelling as the editor and live views. Hard edges, no rounded corners, no decorative gradients.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"meta\">\n        <div>Stack<\u002Fdiv>            <div class=\"v\">HTML · CSS · vanilla JS<\u002Fdiv>\n        <div>Grid<\u002Fdiv>             <div class=\"v\">4 / 8 px<\u002Fdiv>\n        <div>A11y<\u002Fdiv>             <div class=\"v\">WCAG 2.2 AA<\u002Fdiv>\n        <div>Focus ring<\u002Fdiv>       <div class=\"v\">2px amber @ +2px gap<\u002Fdiv>\n        <div>Components<\u002Fdiv>       <div class=\"v\">13 families · 80+ states<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ═════════════════════════════════════════\n         FOUNDATIONS — TOKENS\n         ═════════════════════════════════════════ -->\n    <section class=\"section\" id=\"tokens\">\n      <header class=\"section-head\">\n        <div class=\"num\">F<\u002Fdiv>\n        <div>\n          <div class=\"t\">Foundations<\u002Fdiv>\n          <div class=\"d\">Tokens carried forward from <code style=\"font-family:var(--mono);color:var(--primary)\">CueFlow Redesign.html<\u002Fcode> — no new colors invented here. Semantic names map onto the broadcast roles: amber = standby/primary, red = tally/destructive, green = locked/success.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fheader>\n\n      <!-- Semantic palette -->\n      <div class=\"block\">\n        <header class=\"block-head\">\n          <div class=\"t\">Semantic palette<\u002Fdiv>\n          <div class=\"ix\">F1.1 · 9 tokens<\u002Fdiv>\n        <\u002Fheader>\n        <div class=\"tok-grid\">\n          <div class=\"tok\"><div class=\"tok-sw tile\" style=\"--swatch:#f0a838\"><\u002Fdiv><div class=\"tok-name\">Primary<\u002Fdiv><div class=\"tok-hex\">#F0A838 · --primary<\u002Fdiv><div class=\"tok-use\">Standby, focus, primary CTA, key data values<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"tok-sw tile\" style=\"--swatch:#ff2848\"><\u002Fdiv><div class=\"tok-name\">Danger<\u002Fdiv><div class=\"tok-hex\">#FF2848 · --danger<\u002Fdiv><div class=\"tok-use\">Tally on-air, destructive, errors, urgent countdowns<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"tok-sw tile\" style=\"--swatch:#18d986\"><\u002Fdiv><div class=\"tok-name\">Success<\u002Fdiv><div class=\"tok-hex\">#18D986 · --success<\u002Fdiv><div class=\"tok-use\">Locked, connected, validated, complete<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"tok-sw tile\" style=\"--swatch:#4c8dff\"><\u002Fdiv><div class=\"tok-name\">Info<\u002Fdiv><div class=\"tok-hex\">#4C8DFF · --info<\u002Fdiv><div class=\"tok-use\">Neutral information, links inside body text<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"tok-sw tile\" style=\"--swatch:#7c7e8a\"><\u002Fdiv><div class=\"tok-name\">Neutral<\u002Fdiv><div class=\"tok-hex\">#7C7E8A · --txt-mid<\u002Fdiv><div class=\"tok-use\">Default chip, ambient label, helper text<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Surfaces -->\n      <div class=\"block\">\n        <header class=\"block-head\">\n          <div class=\"t\">Surfaces &amp; lines<\u002Fdiv>\n          <div class=\"ix\">F1.2 · 9 tokens<\u002Fdiv>\n        <\u002Fheader>\n        <div class=\"tok-grid six\">\n          <div class=\"tok\"><div class=\"tok-sw\" style=\"background:#07070a;border:1px solid var(--hair)\"><\u002Fdiv><div class=\"tok-name\">bg<\u002Fdiv><div class=\"tok-hex\">#07070A<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"tok-sw\" style=\"background:#0a0a0d;border:1px solid var(--hair)\"><\u002Fdiv><div class=\"tok-name\">canvas<\u002Fdiv><div class=\"tok-hex\">#0A0A0D<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"tok-sw\" style=\"background:#111116;border:1px solid var(--hair)\"><\u002Fdiv><div class=\"tok-name\">surface<\u002Fdiv><div class=\"tok-hex\">#111116<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"tok-sw\" style=\"background:#16161c;border:1px solid var(--hair)\"><\u002Fdiv><div class=\"tok-name\">surface-2<\u002Fdiv><div class=\"tok-hex\">#16161C<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"tok-sw\" style=\"background:#1d1d24;border:1px solid var(--hair)\"><\u002Fdiv><div class=\"tok-name\">surface-3<\u002Fdiv><div class=\"tok-hex\">#1D1D24<\u002Fdiv><\u002Fdiv>\n          <div class=\"tok\"><div class=\"tok-sw\" style=\"background:#3a3a48;border:1px solid var(--hair)\"><\u002Fdiv><div class=\"tok-name\">hair-3<\u002Fdiv><div class=\"tok-hex\">#3A3A48<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Spacing -->\n      <div class=\"block\">\n        <header class=\"block-head\">\n          <div class=\"t\">Spacing scale<\u002Fdiv>\n          <div class=\"ix\">F1.3 · 4-px grid<\u002Fdiv>\n          <div class=\"d\">All padding, margin, and component heights resolve to multiples of 4. Component heights snap to <b>28 · 36 · 44<\u002Fb>.<\u002Fdiv>\n        <\u002Fheader>\n        <div>\n          <div class=\"sp-row\"><div class=\"tok-name\">--s-1<\u002Fdiv><div><div class=\"sp-bar\" style=\"width:4px\"><\u002Fdiv><\u002Fdiv><div class=\"px\">4 px<\u002Fdiv><\u002Fdiv>\n          <div class=\"sp-row\"><div class=\"tok-name\">--s-2<\u002Fdiv><div><div class=\"sp-bar\" style=\"width:8px\"><\u002Fdiv><\u002Fdiv><div class=\"px\">8 px<\u002Fdiv><\u002Fdiv>\n          <div class=\"sp-row\"><div class=\"tok-name\">--s-3<\u002Fdiv><div><div class=\"sp-bar\" style=\"width:12px\"><\u002Fdiv><\u002Fdiv><div class=\"px\">12 px<\u002Fdiv><\u002Fdiv>\n          <div class=\"sp-row\"><div class=\"tok-name\">--s-4<\u002Fdiv><div><div class=\"sp-bar\" style=\"width:16px\"><\u002Fdiv><\u002Fdiv><div class=\"px\">16 px<\u002Fdiv><\u002Fdiv>\n          <div class=\"sp-row\"><div class=\"tok-name\">--s-5<\u002Fdiv><div><div class=\"sp-bar\" style=\"width:20px\"><\u002Fdiv><\u002Fdiv><div class=\"px\">20 px<\u002Fdiv><\u002Fdiv>\n          <div class=\"sp-row\"><div class=\"tok-name\">--s-6<\u002Fdiv><div><div class=\"sp-bar\" style=\"width:24px\"><\u002Fdiv><\u002Fdiv><div class=\"px\">24 px<\u002Fdiv><\u002Fdiv>\n          <div class=\"sp-row\"><div class=\"tok-name\">--s-8<\u002Fdiv><div><div class=\"sp-bar\" style=\"width:32px\"><\u002Fdiv><\u002Fdiv><div class=\"px\">32 px<\u002Fdiv><\u002Fdiv>\n          <div class=\"sp-row\"><div class=\"tok-name\">--s-12<\u002Fdiv><div><div class=\"sp-bar\" style=\"width:48px\"><\u002Fdiv><\u002Fdiv><div class=\"px\">48 px<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Type -->\n      <div class=\"block\" id=\"type\">\n        <header class=\"block-head\">\n          <div class=\"t\">Type scale<\u002Fdiv>\n          <div class=\"ix\">F2 · 3 families<\u002Fdiv>\n          <div class=\"d\">IBM Plex Sans for body / UI · IBM Plex Sans Condensed for headlines, labels, and tabular UI · JetBrains Mono for timecode, IDs, and numeric values. Body never drops below 12 px.<\u002Fdiv>\n        <\u002Fheader>\n        <div class=\"demo col\">\n          <div class=\"type-sample\">\n            <div style=\"font-family:var(--cond);font-size:72px;font-weight:700;text-transform:uppercase;letter-spacing:-0.015em;line-height:0.92;color:var(--txt-hi)\">Display · 72<\u002Fdiv>\n            <div class=\"type-spec\"><b>Cond 700<\u002Fb><span>72/0.92<\u002Fspan><span>tracking −0.015em<\u002Fspan><span>uppercase<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"type-sample\">\n            <div style=\"font-family:var(--cond);font-size:36px;font-weight:700;text-transform:uppercase;letter-spacing:-0.005em;color:var(--txt-hi)\">Heading 1 · 36<\u002Fdiv>\n            <div class=\"type-spec\"><b>Cond 700<\u002Fb><span>36/1<\u002Fspan><span>uppercase<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"type-sample\">\n            <div style=\"font-family:var(--cond);font-size:22px;font-weight:600;text-transform:uppercase;color:var(--txt-hi)\">Heading 2 · 22<\u002Fdiv>\n            <div class=\"type-spec\"><b>Cond 600<\u002Fb><span>22/1.1<\u002Fspan><span>uppercase<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"type-sample\">\n            <div style=\"font-family:var(--sans);font-size:16px;line-height:1.5;color:var(--txt)\">Body · 16. Used for paragraph copy inside cards and modals. Pretty wrap when available.<\u002Fdiv>\n            <div class=\"type-spec\"><b>Sans 400<\u002Fb><span>16/1.5<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"type-sample\">\n            <div style=\"font-family:var(--sans);font-size:13px;color:var(--txt)\">Body small · 13. Default table and form sizes.<\u002Fdiv>\n            <div class=\"type-spec\"><b>Sans 400<\u002Fb><span>13/1.45<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"type-sample\">\n            <div style=\"font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--txt-mid)\">EYEBROW LABEL · 11<\u002Fdiv>\n            <div class=\"type-spec\"><b>Cond 700<\u002Fb><span>11<\u002Fspan><span>+0.22em<\u002Fspan><span>uppercase<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"type-sample\">\n            <div style=\"font-family:var(--mono);font-size:22px;font-weight:600;color:var(--txt-hi);letter-spacing:-0.01em\">01:24:56:12<\u002Fdiv>\n            <div class=\"type-spec\"><b>Mono 600<\u002Fb><span>22/1<\u002Fspan><span>tnum + zero<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"type-sample\">\n            <div style=\"font-family:var(--mono);font-size:11px;color:var(--txt-mid)\">--mono   inline code · 11<\u002Fdiv>\n            <div class=\"type-spec\"><b>Mono 400<\u002Fb><span>11<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ═════════════════════════════════════════\n         SECTION 1 · INPUT CONTROLS\n         ═════════════════════════════════════════ -->\n    <section class=\"section\" id=\"section-1\">\n      <header class=\"section-head\">\n        <div class=\"num\">01<\u002Fdiv>\n        <div>\n          <div class=\"t\">Input Controls<\u002Fdiv>\n          <div class=\"d\">Buttons, fields, choice controls and dropdowns. Every input ships with focus, hover, active, disabled and error states. Hit targets meet 28 / 36 / 44 px ceilings.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fheader>\n\n      <!-- ── BUTTONS ────────────────────────── -->\n      <div class=\"block\" id=\"buttons\">\n        <header class=\"block-head\">\n          <div class=\"t\">1.1 · Buttons<\u002Fdiv>\n          <div class=\"ix\">PRIMARY · SECONDARY · GHOST · DANGER · ICON<\u002Fdiv>\n          <div class=\"d\">Four hierarchies. Three sizes (28/36/44). All buttons use condensed caps for the label — same vocabulary as the cockpit toolbars.<\u002Fdiv>\n        <\u002Fheader>\n\n        <!-- HIERARCHY -->\n        <div class=\"demo\">\n          <div class=\"demo-corner\">Hierarchy · MD<\u002Fdiv>\n          <button class=\"btn primary\"><span class=\"btn-lbl\">Go to air<\u002Fspan><\u002Fbutton>\n          <button class=\"btn\"><span class=\"btn-lbl\">Edit cue<\u002Fspan><\u002Fbutton>\n          <button class=\"btn ghost\"><span class=\"btn-lbl\">Cancel<\u002Fspan><\u002Fbutton>\n          <button class=\"btn danger\"><span class=\"btn-lbl\">Abort show<\u002Fspan><\u002Fbutton>\n          <button class=\"btn danger solid\"><span class=\"btn-lbl\">Delete<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- STATES -->\n        <div class=\"demo\">\n          <div class=\"demo-corner\">Primary states<\u002Fdiv>\n          <div class=\"cluster\"><button class=\"btn primary\"><span class=\"btn-lbl\">Default<\u002Fspan><\u002Fbutton><div class=\"state\">Default<\u002Fdiv><\u002Fdiv>\n          <div class=\"cluster\"><button class=\"btn primary\" style=\"background:#ffba50;border-color:#ffba50\"><span class=\"btn-lbl\">Hover<\u002Fspan><\u002Fbutton><div class=\"state\">Hover<\u002Fdiv><\u002Fdiv>\n          <div class=\"cluster\"><button class=\"btn primary\" style=\"background:#d8941f;border-color:#d8941f\"><span class=\"btn-lbl\">Active<\u002Fspan><\u002Fbutton><div class=\"state\">Active<\u002Fdiv><\u002Fdiv>\n          <div class=\"cluster\"><button class=\"btn primary\" style=\"box-shadow:var(--focus)\"><span class=\"btn-lbl\">Focus<\u002Fspan><\u002Fbutton><div class=\"state\">Focus-visible<\u002Fdiv><\u002Fdiv>\n          <div class=\"cluster\"><button class=\"btn primary is-loading\"><span class=\"spin\"><\u002Fspan><span class=\"btn-lbl\">Saving…<\u002Fspan><\u002Fbutton><div class=\"state\">Loading<\u002Fdiv><\u002Fdiv>\n          <div class=\"cluster\"><button class=\"btn primary is-disabled\" disabled=\"\"><span class=\"btn-lbl\">Disabled<\u002Fspan><\u002Fbutton><div class=\"state\">Disabled<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- SIZES -->\n        <div class=\"demo\">\n          <div class=\"demo-corner\">Sizes · 28 / 36 / 44<\u002Fdiv>\n          <div class=\"cluster\"><button class=\"btn primary sm\"><span class=\"btn-lbl\">Small<\u002Fspan><\u002Fbutton><div class=\"state\">SM · 28<\u002Fdiv><\u002Fdiv>\n          <div class=\"cluster\"><button class=\"btn primary\"><span class=\"btn-lbl\">Medium<\u002Fspan><\u002Fbutton><div class=\"state\">MD · 36<\u002Fdiv><\u002Fdiv>\n          <div class=\"cluster\"><button class=\"btn primary lg\"><span class=\"btn-lbl\">Large<\u002Fspan><\u002Fbutton><div class=\"state\">LG · 44<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- WITH ICONS + ICON-ONLY -->\n        <div class=\"demo\">\n          <div class=\"demo-corner\">With icons · icon-only<\u002Fdiv>\n          <button class=\"btn primary\"><svg viewBox=\"0 0 16 16\"><path d=\"M3 2l11 6-11 6z\"><\u002Fpath><\u002Fsvg><span class=\"btn-lbl\">Take<\u002Fspan><\u002Fbutton>\n          <button class=\"btn\"><svg viewBox=\"0 0 16 16\"><path d=\"M4 8h8M8 4v8\"><\u002Fpath><\u002Fsvg><span class=\"btn-lbl\">Add cue<\u002Fspan><\u002Fbutton>\n          <button class=\"btn ghost\"><span class=\"btn-lbl\">Open<\u002Fspan><svg viewBox=\"0 0 16 16\"><path d=\"M5 3l6 5-6 5\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <button class=\"btn icon\" aria-label=\"Settings\"><svg viewBox=\"0 0 16 16\"><circle cx=\"8\" cy=\"8\" r=\"2.5\"><\u002Fcircle><path d=\"M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.5 1.5M11.5 11.5L13 13M3 13l1.5-1.5M11.5 4.5L13 3\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <button class=\"btn icon sm\" aria-label=\"Close\"><svg viewBox=\"0 0 16 16\"><path d=\"M4 4l8 8M12 4L4 12\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <button class=\"btn icon lg\" aria-label=\"Record\"><svg viewBox=\"0 0 16 16\"><circle cx=\"8\" cy=\"8\" r=\"4\" fill=\"currentColor\"><\u002Fcircle><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n\n        <pre class=\"code\"><span class=\"tk-com\">&lt;!-- Primary, medium, with icon --&gt;<\u002Fspan>\n<span class=\"tk-tag\">&lt;button<\u002Fspan> <span class=\"tk-att\">class<\u002Fspan>=<span class=\"tk-str\">\"btn primary\"<\u002Fspan><span class=\"tk-tag\">&gt;<\u002Fspan>\n  <span class=\"tk-tag\">&lt;svg<\u002Fspan> <span class=\"tk-att\">viewBox<\u002Fspan>=<span class=\"tk-str\">\"0 0 16 16\"<\u002Fspan><span class=\"tk-tag\">&gt;<\u002Fspan>…<span class=\"tk-tag\">&lt;/svg&gt;<\u002Fspan>\n  <span class=\"tk-tag\">&lt;span<\u002Fspan> <span class=\"tk-att\">class<\u002Fspan>=<span class=\"tk-str\">\"btn-lbl\"<\u002Fspan><span class=\"tk-tag\">&gt;<\u002Fspan>Take<span class=\"tk-tag\">&lt;/span&gt;<\u002Fspan>\n<span class=\"tk-tag\">&lt;/button&gt;<\u002Fspan>\n\n<span class=\"tk-com\">/* Modifiers */<\u002Fspan>\n.btn               <span class=\"tk-com\">/* secondary, default */<\u002Fspan>\n.btn.primary       <span class=\"tk-com\">/* amber fill */<\u002Fspan>\n.btn.ghost         <span class=\"tk-com\">/* transparent, no border */<\u002Fspan>\n.btn.danger        <span class=\"tk-com\">/* red outline */<\u002Fspan>\n.btn.danger.solid  <span class=\"tk-com\">/* red fill */<\u002Fspan>\n.btn.sm / .btn.lg  <span class=\"tk-com\">/* size */<\u002Fspan>\n.btn.icon          <span class=\"tk-com\">/* square icon-only */<\u002Fspan>\n.btn.is-loading    <span class=\"tk-com\">/* prepend .spin element */<\u002Fspan><\u002Fpre>\n\n        <dl class=\"spec\">\n          <dt>Heights<\u002Fdt><dd>SM 28 · MD 36 · LG 44 px<\u002Fdd>\n          <dt>Padding-x<\u002Fdt><dd>SM 12 · MD 16 · LG 20 px<\u002Fdd>\n          <dt>Label<\u002Fdt><dd>Plex Cond 700 · 10/11/12 · uppercase · +0.14em<\u002Fdd>\n          <dt>Border<\u002Fdt><dd>1 px --hair2 → --hair3 on hover<\u002Fdd>\n          <dt>Focus ring<\u002Fdt><dd>2px transparent gap + 2px --primary outline<\u002Fdd>\n          <dt>Min tap target<\u002Fdt><dd>44×44 px (mobile/touch contexts)<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <!-- ── TEXT FIELDS ──────────────────── -->\n      <div class=\"block\" id=\"fields\">\n        <header class=\"block-head\">\n          <div class=\"t\">1.2 · Text fields<\u002Fdiv>\n          <div class=\"ix\">INPUT · PASSWORD · TEXTAREA · FLOATING<\u002Fdiv>\n          <div class=\"d\">Monosp >\n          <label class=\"check radio\"><input type=\"radio\" name=\"r1\" checked=\"\"><span class=\"box\"><\u002Fspan> <span>Sequence B<\u002Fspan><\u002Flabel>\n          <label class=\"check radio\"><input type=\"radio\" name=\"r1\"><span class=\"box\"><\u002Fspan> <span>Sequence C<\u002Fspan><\u002Flabel>\n          <label class=\"check radio is-disabled\"><input type=\"radio\" name=\"r1\" disabled=\"\"><span class=\"box\"><\u002Fspan> <span>Sequence D (locked)<\u002Fspan><\u002Flabel>\n        <\u002Fdiv>\n\n        <dl class=\"spec\">\n          <dt>Box size<\u002Fdt><dd>18×18 px · 32×32 tap region via label padding<\u002Fdd>\n          <dt>Selected fill<\u002Fdt><dd>--primary · 12 px checkmark stroke 2.4<\u002Fdd>\n          <dt>Label<\u002Fdt><dd>Plex Sans 13 · txt<\u002Fdd>\n          <dt>Indeterminate<\u002Fdt><dd>10×2 dark bar inside amber-filled box<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <!-- ── DROPDOWNS ─────────────────────── -->\n      <div class=\"block\" id=\"dropdowns\">\n        <header class=\"block-head\">\n          <div class=\"t\">1.4 · Dropdowns<\u002Fdiv>\n          <div class=\"ix\">SELECT · AUTOCOMPLETE · OPEN MENU<\u002Fdiv>\n          <div class=\"d\">Select trigger matches the text field. Open menu drops 4 px below with a heavy box-shadow against the dark canvas — never overlays a focused field with translucency.<\u002Fdiv>\n        <\u002Fheader>\n\n        <div class=\"demo\" style=\"align-items:flex-start;gap:var(--s-8)\">\n          <div class=\"cluster\" style=\"align-items:flex-start;gap:0\">\n            <div class=\"fld\">\n              <label class=\"fld-lbl\">Track<\u002Flabel>\n              <div class=\"select-shell\">\n                <button class=\"select-trigger\" type=\"button\" data-select=\"\">\n                  <span>Cameras<\u002Fspan>\n                  <svg class=\"caret\" viewBox=\"0 0 10 10\"><path d=\"M2 4l3 3 3-3\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n an><span class=\"v\">00:42<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"card-foot\">\n              <span class=\"badge success\"><span class=\"dot\"><\u002Fspan>Tally<\u002Fspan>\n              <button class=\"btn sm primary\"><span class=\"btn-lbl\">Standby<\u002Fspan><\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Farticle>\n\n          <article class=\"card\">\n            <div class=\"card-img\" style=\"background:var(--surface2)\">\n              <span class=\"ph\" style=\"color:var(--txt-low)\">[ Waveform · 06:14 ]<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"card-body\">\n              <div class=\"card-eyebrow\"><span class=\"pip-dot\" style=\"display:inline-block;width:6px;height:6px;background:var(--warning)\"><\u002Fspan> Standby<\u002Fdiv>\n              <h3 class=\"card-title\">Cold open · VO<\u002Fh3>\n              <p class=\"card-desc\">Voice-over track for the title sequence. Lock window 00:08 → 00:14.<\u002Fp>\n              <div class=\"card-meta\">\n                <div><span class=\"lbl\">Loudness<\u002Fspan><span class=\"v\">−16 LU<\u002Fspan><\u002Fdiv>\n                <div><span class=\"lbl\">Length<\u002Fspan><span class=\"v\">00:24<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"card-foot\">\n              <span class=\"badge warning\"><span class=\"dot\"><\u002Fspan>Cue ready<\u002Fspan>\n              <button class=\"btn sm\"><span class=\"btn-lbl\">Preview<\u002Fspan><\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fdiv>\n\n        <dl class=\"spec\">\n          <dt>Width<\u002Fdt><dd>280–320 px (grid item) · flex when fluid<\u002Fdd>\n          <dt>Image<\u002Fdt><dd>16 : 10 · striped placeholder until art is supplied<\u002Fdd>\n          <dt>Body<\u002Fdt><dd>20 / 16 padding · cond title 22 · sans desc 13<\u002Fdd>\n          <dt>Foot<\u002Fdt><dd>12 / 16 · always 1 small button + 1 badge or counter<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <!-- ── BADGES ─────────────────────── -->\n      <div class=\"block\" id=\"badges\">\n        <header class=\"block-head\">\n          <div class=\"t\">3.2 · Badges &amp; Tags<\u002Fdiv>\n          <div class=\"ix\">OUTLINE · SOLID · REMOVABLE<\u002Fdiv>\n        <\u002Fheader>\n\n        <div class=\"demo\">\n          <div class=\"demo-corner\">Outline · semantic<\u002Fdiv>\n          <span class=\"badge success\"><span class=\"dot\"><\u002Fspan>Success<\u002Fspan>\n          <span class=\"badge warning\"><span class=\"dot\"><\u002Fspan>Warning<\u002Fspan>\n          <span class=\"badge danger\"><span class=\"dot\"><\u002Fspan>Error<\u002Fspan>\n          <span class=\"badge info\"><span class=\"dot\"><\u002Fspan>Info<\u002Fspan>\n          <span class=\"badge neutral\"><span class=\"dot\"><\u002Fspan>Neutral<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"demo\">\n          <div class=\"demo-corner\">Solid<\u002Fdiv>\n          <span class=\"badge solid success\">Locked<\u002Fspan>\n          <span class=\"badge solid warning\">Standby<\u002Fspan>\n          <span class=\"badge solid danger\">ON AIR<\u002Fspan>\n          <span class=\"badge solid info\">Beta<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"demo\">\n          <div class=\"demo-corner\">Removable tags<\u002Fdiv>\n          <span class=\"tag\">CAM_03 <button class=\"x\" aria-label=\"Remove\"><svg viewBox=\"0 0 12 12\"><path d=\"M3 3l6 6M9 3l-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fspan>\n          <span class=\"tag\">GFX_LT3 <button class=\"x\" aria-label=\"Remove\"><svg viewBox=\"0 0 12 12\"><path d=\"M3 3l6 6M9 3l-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fspan>\n          <span class=\"tag\">VO_OPEN <button class=\"x\" aria-label=\"Remove\"><svg viewBox=\"0 0 12 12\"><path d=\"M3 3l6 6M9 3l-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fspan>\n          <span class=\"tag\">AUTO_CUT <button class=\"x\" aria-label=\"Remove\"><svg viewBox=\"0 0 12 12\"><path d=\"M3 3l6 6M9 3l-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fspan>\n        <\u002Fdiv>\n\n        <dl class=\"spec\">\n          <dt>Height<\u002Fdt><dd>20 px · Tag 26 px<\u002Fdd>\n          <dt>Label<\u002Fdt><dd>Plex Cond 10 · 700 · uppercase · +0.14em<\u002Fdd>\n          <dt>Dot<\u002Fdt><dd>6 px circle · matches semantic color<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <!-- ── MODAL ──────────────────────── -->\n      <div class=\"block\" id=\"modals\">\n        <header class=\"block-head\">\n          <div class=\"t\">3.3 · Modals<\u002Fdiv>\n          <div class=\"ix\">CONFIRM · DESTRUCTIVE<\u002Fdiv>\n          <div class=\"d\">Modals carry a 2 px primary top-bar to anchor them. Backdrop is opaque-leaning to take focus off the cockpit.<\u002Fdiv>\n        <\u002Fheader>\n\n        <div class=\"modal-stage\">\n          <div class=\"modal-backdrop\"><\u002Fdiv>\n          <div class=\"modal\" role=\"dialog\" aria-labelledby=\"mt1\">\n            <div class=\"modal-head\">\n              <div>\n                <div class=\"eyebrow\">Confirm<\u002Fdiv>\n                <h3 id=\"mt1\">Push Sequence to Air?<\u002Fh3>\n              <\u002Fdiv>\n              <button class=\"close\" aria-label=\"Close\">\n                <svg viewBox=\"0 0 16 16\"><path d=\"M4 4l8 8M12 4L4 12\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n            <div class=\"modal-body\">\n              <p>This will replace the running cue list with <strong style=\"color:var(--txt-hi)\">ACT_2_OPEN<\u002Fstrong> at the next safe cut point (~ 00:04). Camera and graphic tracks will rebind.<\u002Fp>\n              <p style=\"color:var(--txt-mid);font-size:12.5px;border-left:2px solid var(--hair3);padding-left:12px\">Currently on air: <span style=\"font-family:var(--mono);color:var(--txt-hi)\">ACT_1_CLOSE<\u002Fspan> · 02:11 elapsed<\u002Fp>\n            <\u002Fdiv>\n            <div class=\"modal-foot\">\n              <button class=\"btn ghost\"><span class=\"btn-lbl\">Cancel<\u002Fspan><\u002Fbutton>\n              <button class=\"btn\"><span class=\"btn-lbl\">Schedule<\u002Fspan><\u002Fbutton>\n              <button class=\"btn primary\"><svg viewBox=\"0 0 16 16\"><path d=\"M3 2l11 6-11 6z\"><\u002Fpath><\u002Fsvg><span class=\"btn-lbl\">Push now<\u002Fspan><\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"modal-stage\" style=\"margin-top:var(--s-5)\">\n          <div class=\"modal-backdrop\"><\u002Fdiv>\n          <div class=\"modal\" role=\"dialog\" aria-labelledby=\"mt2\" style=\"border-top-color:var(--danger)\">\n            <div class=\"modal-head\">\n              <div>\n                <div class=\"eyebrow\" style=\"color:var(--danger)\">Destructive · Cannot undo<\u002Fdiv>\n                <h3 id=\"mt2\">Delete sequence ACT_2_OPEN?<\u002Fh3>\n              <\u002Fdiv>\n              <button class=\"close\" aria-label=\"Close\">\n                <svg viewBox=\"0 0 16 16\"><path d=\"M4 4l8 8M12 4L4 12\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n            <div class=\"modal-body\">\n              <p>The sequence and its <strong style=\"color:var(--txt-hi)\">24 cues<\u002Fstrong>, <strong style=\"color:var(--txt-hi)\">3 camera tracks<\u002Fstrong> and <strong style=\"color:var(--txt-hi)\">audio bed<\u002Fstrong> will be removed. Linked sequences will be relinked to <strong style=\"color:var(--txt-hi)\">ACT_2_BACKUP<\u002Fstrong>.<\u002Fp>\n              <div class=\"fld\">\n                <label class=\"fld-lbl\">Type <span style=\"font-family:var(--mono);color:var(--danger)\">ACT_2_OPEN<\u002Fspan> to confirm<\u002Flabel>\n                <div class=\"input is-error\"><input type=\"text\" placeholder=\"Sequence name\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"modal-foot\">\n              <button class=\"btn ghost\"><span class=\"btn-lbl\">Cancel<\u002Fspan><\u002Fbutton>\n              <button class=\"btn danger solid is-disabled\" disabled=\"\"><span class=\"btn-lbl\">Delete sequence<\u002Fspan><\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <dl class=\"spec\">\n          <dt>Width<\u002Fdt><dd>min(520, 90%) · always centered<\u002Fdd>\n          <dt>Top bar<\u002Fdt><dd>2 px · --primary (default) · --danger (destructive)<\u002Fdd>\n          <dt>Backdrop<\u002Fdt><dd>rgba(5,5,7,0.85) · 2 px blur<\u002Fdd>\n          <dt>Buttons<\u002Fdt><dd>right-aligned · ghost cancel + primary action<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n      <!-- ── TOOLTIPS ──────────────────── -->\n      <div class=\"block\" id=\"tooltips\">\n        <header class=\"block-head\">\n          <div class=\"t\">3.4 · Tooltips<\u002Fdiv>\n          <div class=\"ix\">TOP · RIGHT · BOTTOM · LEFT<\u002Fdiv>\n          <div class=\"d\">Condensed-caps payload, optional keyboard shortcut. Always shown statically for documentation; pair with <code style=\"font-family:var(--mono);color:var(--primary)\">aria-describedby<\u002Fcode> in production.<\u002Fdiv>\n        <\u002Fheader>\n\n        <div class=\"demo pad-lg\" style=\"justify-content:space-around\">\n          <div class=\"tip-host\">\n            <button class=\"btn primary\"><span class=\"btn-lbl\">Hover me<\u002Fspan><\u002Fbutton>\n            <div class=\"tip top\">Push to air<kbd>↵<\u002Fkbd><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tip-host\">\n            <button class=\"btn\"><span class=\"btn-lbl\">Right<\u002Fspan><\u002Fbutton>\n            <div class=\"tip right\">Next cue<kbd>→<\u002Fkbd><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tip-host\">\n            <button class=\"btn\"><span class=\"btn-lbl\">Bottom<\u002Fspan><\u002Fbutton>\n            <div class=\"tip bottom\">Toggle waveform<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tip-host\">\n            <button class=\"btn\"><span class=\"btn-lbl\">Left<\u002Fspan><\u002Fbutton>\n            <div class=\"tip left\">Previous<kbd>←<\u002Fkbd><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ── PROGRESS ──────────────────── -->\n      <div class=\"block\" id=\"progress\">\n        <header class=\"block-head\">\n          <div class=\"t\">3.5 · Progress<\u002Fdiv>\n          <div class=\"ix\">LINEAR · CIRCULAR · STATES<\u002Fdiv>\n        <\u002Fheader>\n\n        <div class=\"demo\" style=\"gap:var(--s-8);align-items:flex-start;flex-wrap:wrap\">\n          <div class=\"cluster\" style=\"align-items:stretch;gap:var(--s-3)\">\n            <div class=\"prog\">\n              <div class=\"prog-head\"><span>Render<\u002Fspan><span class=\"v\">42%<\u002Fspan><\u002Fdiv>\n              <div class=\"prog-bar\"><div class=\"fill\" style=\"width:42%\"><\u002Fdiv><\u002Fdiv>\n              <div class=\"prog-head\" style=\"color:var(--txt-low)\"><span>ETA 02:14<\u002Fspan><span class=\"v\" style=\"color:var(--txt-mid)\">187 / 442 MB<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"state\">In-progress<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"cluster\" style=\"align-items:stretch;gap:var(--s-3)\">\n            <div class=\"prog\">\n              <div class=\"prog-head\"><span>Upload<\u002Fspan><span class=\"v\" style=\"color:var(--success)\">Complete<\u002Fspan><\u002Fdiv>\n              <div class=\"prog-bar success\"><div class=\"fill\" style=\"width:100%\"><\u002Fdiv><\u002Fdiv>\n              <div class=\"prog-head\" style=\"color:var(--txt-low)\"><span>01:48 elapsed<\u002Fspan><span class=\"v\" style=\"color:var(--txt-mid)\">442 / 442 MB<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"state\">Complete<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"cluster\" style=\"align-items:stretch;gap:var(--s-3)\">\n            <div class=\"prog\">\n              <div class=\"prog-head\"><span>Sync<\u002Fspan><span class=\"v\" style=\"color:var(--danger)\">Failed<\u002Fspan><\u002Fdiv>\n              <div class=\"prog-bar danger\"><div class=\"fill\" style=\"width:64%\"><\u002Fdiv><\u002Fdiv>\n              <div class=\"prog-head\" style=\"color:var(--txt-low)\"><span>Connection lost · retry?<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"state\">Error<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"cluster\" style=\"align-items:stretch;gap:var(--s-3)\">\n            <div class=\"prog\">\n              <div class=\"prog-head\"><span>Initialising…<\u002Fspan><span class=\"v\" style=\"color:var(--txt-mid)\">—<\u002Fspan><\u002Fdiv>\n              <div class=\"prog-bar indet\"><div class=\"fill\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"state\">Indeterminate<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"demo\" style=\"gap:var(--s-10);justify-content:center;padding:var(--s-10)\">\n          <div class=\"cluster\">\n            <div class=\"spinner indet lg\">\n              <svg viewBox=\"0 0 36 36\"><circle class=\"track\" cx=\"18\" cy=\"18\" r=\"14\"><\u002Fcircle><circle class=\"head\" cx=\"18\" cy=\"18\" r=\"14\" stroke-dasharray=\"60 100\"><\u002Fcircle><\u002Fsvg>\n            <\u002Fdiv>\n            <div class=\"state\">Indeterminate<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cluster\">\n            <div class=\"spinner lg\">\n              <svg viewBox=\"0 0 36 36\">\n                <circle class=\"track\" cx=\"18\" cy=\"18\" r=\"14\"><\u002Fcircle>\n                <circle class=\"head\" cx=\"18\" cy=\"18\" r=\"14\" stroke-dasharray=\"40 100\"><\u002Fcircle>\n              <\u002Fsvg>\n              <span class=\"pct\">46%<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"state\">Determinate · 46<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cluster\">\n            <div class=\"spinner success lg\">\n              <svg viewBox=\"0 0 36 36\">\n                <circle class=\"track\" cx=\"18\" cy=\"18\" r=\"14\"><\u002Fcircle>\n                <circle class=\"head\" cx=\"18\" cy=\"18\" r=\"14\" stroke-dasharray=\"87.96 100\"><\u002Fcircle>\n              <\u002Fsvg>\n              <span class=\"pct\" style=\"color:var(--success)\">✓<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"state\">Complete<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cluster\">\n            <div class=\"spinner danger lg\">\n              <svg viewBox=\"0 0 36 36\">\n                <circle class=\"track\" cx=\"18\" cy=\"18\" r=\"14\"><\u002Fcircle>\n                <circle class=\"head\" cx=\"18\" cy=\"18\" r=\"14\" stroke-dasharray=\"55 100\"><\u002Fcircle>\n              <\u002Fsvg>\n              <span class=\"pct\" style=\"color:var(--danger)\">!<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"state\">Failed<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <dl class=\"spec\">\n          <dt>Linear · height<\u002Fdt><dd>6 px (default) · 10 px (lg, hero countdown)<\u002Fdd>\n          <dt>Fill<\u002Fdt><dd>primary / success / warning / danger · transition 200 ms<\u002Fdd>\n          <dt>Indeterminate<\u002Fdt><dd>30% wide bar, 1.6 s loop<\u002Fdd>\n          <dt>Circular<\u002Fdt><dd>36 / 56 px · 3 px stroke · square line-cap<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n\n    <\u002Fsection>\n\n    <footer class=\"docfoot\">\n      <div>\n        End of UI Kit v1.0 · 13 component families documented<br>\n        Production-ready · drop-in <code style=\"font-family:var(--mono);color:var(--primary)\">.css<\u002Fcode> with token aliases under <code style=\"font-family:var(--mono);color:var(--primary)\">--cf-*<\u002Fcode> available on request\n      <\u002Fdiv>\n      <div>\n        Build · <span class=\"v\">2026.05.28<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Ffooter>\n  <\u002Fmain>\n\n<\u002Fdiv>\n\n<script>\n// ── Password show / hide ───────────────────────────────────────\ndocument.querySelectorAll('[data-pw-toggle]').forEach(btn => {\n  btn.addEventListener('click', () => {\n    const id = btn.dataset.pwToggle;\n    const inp = document.getElementById(id);\n    if (!inp) return;\n    inp.type = inp.type === 'password' ? 'text' : 'password';\n  });\n});\n\n// ── Select trigger toggle ──────────────────────────────────────\ndocument.querySelectorAll('[data-select]').forEach(trig => {\n  trig.addEventListener('click', e => {\n    e.stopPropagation();\n    const shell = trig.closest('.select-shell');\n    const wasOpen = shell.classList.contains('is-open');\n    document.querySelectorAll('.select-shell.is-open').forEach(s => {\n      s.classList.remove('is-open');\n      const t = s.querySelector('.select-trigger');\n      if (t) t.classList.remove('is-open');\n    });\n    if (!wasOpen) {\n      shell.classList.add('is-open');\n      trig.classList.add('is-open');\n    }\n  });\n});\n\ndocument.addEventListener('click', e => {\n  // close all open menus when clicking outside\n  if (!e.target.closest('.select-shell')) {\n    document.querySelectorAll('.select-shell.is-open').forEach(s => {\n      s.classList.remove('is-open');\n      const t = s.querySelector('.select-trigger');\n      if (t) t.classList.remove('is-open');\n    });\n  }\n});\n\n// ── Float-label auto-active when input has value ───────────────\ndocument.querySelectorAll('.fld.float input').forEach(inp => {\n  const sync = () => inp.closest('.fld.float').classList.toggle('is-active', !!inp.value);\n  inp.addEventListener('input', sync);\n  sync();\n});\n\n// ── Smooth-scroll rail links + active state ────────────────────\ndocument.querySelectorAll('.docrail-lnk').forEach(a => {\n  a.addEventListener('click', () => {\n    document.querySelectorAll('.docrail-lnk.active').forEach(l => l.classList.remove('active'));\n    a.classList.add('active');\n  });\n});\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
